name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'

jobs:
  test:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit || true

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_AUTH_API_URL: http://localhost:8001
          NEXT_PUBLIC_ANALYTICS_API_URL: http://localhost:8003
          NEXT_PUBLIC_AI_API_URL: http://localhost:8004
          NEXT_PUBLIC_GITHUB_CLIENT_ID: test-client-id

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_AUTH_API_URL=http://localhost:8001 \
            --build-arg NEXT_PUBLIC_ANALYTICS_API_URL=http://localhost:8003 \
            --build-arg NEXT_PUBLIC_AI_API_URL=http://localhost:8004 \
            --build-arg NEXT_PUBLIC_GITHUB_CLIENT_ID=test-id \
            -t devmetrics-frontend:ci \
            ./frontend
