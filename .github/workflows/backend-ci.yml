name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

env:
  DATABASE_URL: postgresql+asyncpg://devmetrics:devmetrics123@localhost:5432/devmetrics_test
  REDIS_URL: redis://localhost:6379/0
  SECRET_KEY: test-secret-key-for-ci-only
  ENVIRONMENT: testing

jobs:
  # ── Auth Service ──────────────────────────────────────────────────────────
  test-auth:
    name: Auth Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/auth

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: devmetrics
          POSTGRES_PASSWORD: devmetrics123
          POSTGRES_DB: devmetrics_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/services/auth/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          GITHUB_CLIENT_ID: test-client-id
          GITHUB_CLIENT_SECRET: test-client-secret
        run: pytest tests/ -v --tb=short

  # ── Analytics Service ─────────────────────────────────────────────────────
  test-analytics:
    name: Analytics Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/analytics

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: devmetrics
          POSTGRES_PASSWORD: devmetrics123
          POSTGRES_DB: devmetrics_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/services/analytics/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── Ingestion Service ─────────────────────────────────────────────────────
  test-ingestion:
    name: Ingestion Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/ingestion

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: devmetrics
          POSTGRES_PASSWORD: devmetrics123
          POSTGRES_DB: devmetrics_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/services/ingestion/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
        run: pytest tests/ -v --tb=short

  # ── AI Service ────────────────────────────────────────────────────────────
  test-ai:
    name: AI Service Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/services/ai

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: devmetrics
          POSTGRES_PASSWORD: devmetrics123
          POSTGRES_DB: devmetrics_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/services/ai/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          OPENAI_API_KEY: sk-test-key-not-real
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/ -v --tb=short

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Python Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Lint backend
        run: ruff check backend/ --ignore E501,E402 || true
