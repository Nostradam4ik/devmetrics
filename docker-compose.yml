services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: devmetrics_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devmetrics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devmetrics123}
      POSTGRES_DB: ${POSTGRES_DB:-devmetrics}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - devmetrics_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devmetrics"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: devmetrics_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - devmetrics_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Auth Service
  auth_service:
    build:
      context: ./backend/services/auth
      dockerfile: Dockerfile
    container_name: devmetrics_auth
    environment:
      DATABASE_URL: postgresql+asyncpg://devmetrics:devmetrics123@postgres:5432/devmetrics
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devmetrics_network
    restart: unless-stopped

  # Ingestion Service
  ingestion_service:
    build:
      context: ./backend/services/ingestion
      dockerfile: Dockerfile
    container_name: devmetrics_ingestion
    environment:
      DATABASE_URL: postgresql+asyncpg://devmetrics:devmetrics123@postgres:5432/devmetrics
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devmetrics_network
    restart: unless-stopped

  # Celery Worker for Ingestion
  celery_worker:
    build:
      context: ./backend/services/ingestion
      dockerfile: Dockerfile
    container_name: devmetrics_celery_worker
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://devmetrics:devmetrics123@postgres:5432/devmetrics
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devmetrics_network
    restart: unless-stopped

  # Celery Beat Scheduler
  celery_beat:
    build:
      context: ./backend/services/ingestion
      dockerfile: Dockerfile
    container_name: devmetrics_celery_beat
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://devmetrics:devmetrics123@postgres:5432/devmetrics
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devmetrics_network
    restart: unless-stopped

  # Analytics Service
  analytics_service:
    build:
      context: ./backend/services/analytics
      dockerfile: Dockerfile
    container_name: devmetrics_analytics
    environment:
      DATABASE_URL: postgresql+asyncpg://devmetrics:devmetrics123@postgres:5432/devmetrics
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devmetrics_network
    restart: unless-stopped

  # AI Service
  ai_service:
    build:
      context: ./backend/services/ai
      dockerfile: Dockerfile
    container_name: devmetrics_ai
    environment:
      DATABASE_URL: postgresql+asyncpg://devmetrics:devmetrics123@postgres:5432/devmetrics
      REDIS_URL: redis://redis:6379/0
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-70b-versatile}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8004:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devmetrics_network
    restart: unless-stopped

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devmetrics_frontend
    environment:
      NEXT_PUBLIC_AUTH_API_URL: http://localhost:8001
      NEXT_PUBLIC_ANALYTICS_API_URL: http://localhost:8003
      NEXT_PUBLIC_AI_API_URL: http://localhost:8004
      NEXT_PUBLIC_GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
    ports:
      - "3000:3000"
    depends_on:
      - auth_service
      - analytics_service
      - ai_service
    networks:
      - devmetrics_network
    restart: unless-stopped

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: devmetrics_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - auth_service
      - ingestion_service
      - analytics_service
      - ai_service
    networks:
      - devmetrics_network
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:

networks:
  devmetrics_network:
    driver: bridge
