services:
  postgres:
    image: postgres:16-alpine
    container_name: devmetrics_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-devmetrics}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - devmetrics_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: devmetrics_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - devmetrics_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  auth_service:
    build:
      context: ./backend/services/auth
      dockerfile: Dockerfile
    container_name: devmetrics_auth
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-devmetrics}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devmetrics_network
    restart: always
    deploy:
      resources:
        limits:
          memory: 512m

  ingestion_service:
    build:
      context: ./backend/services/ingestion
      dockerfile: Dockerfile
    container_name: devmetrics_ingestion
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-devmetrics}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devmetrics_network
    restart: always
    deploy:
      resources:
        limits:
          memory: 512m

  celery_worker:
    build:
      context: ./backend/services/ingestion
      dockerfile: Dockerfile
    container_name: devmetrics_celery_worker
    command: celery -A app.workers.celery_app worker --loglevel=warning --concurrency=4
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-devmetrics}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devmetrics_network
    restart: always

  celery_beat:
    build:
      context: ./backend/services/ingestion
      dockerfile: Dockerfile
    container_name: devmetrics_celery_beat
    command: celery -A app.workers.celery_app beat --loglevel=warning
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-devmetrics}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      ENVIRONMENT: production
    depends_on:
      - celery_worker
    networks:
      - devmetrics_network
    restart: always

  analytics_service:
    build:
      context: ./backend/services/analytics
      dockerfile: Dockerfile
    container_name: devmetrics_analytics
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-devmetrics}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devmetrics_network
    restart: always
    deploy:
      resources:
        limits:
          memory: 512m

  ai_service:
    build:
      context: ./backend/services/ai
      dockerfile: Dockerfile
    container_name: devmetrics_ai
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-devmetrics}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devmetrics_network
    restart: always
    deploy:
      resources:
        limits:
          memory: 512m

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_AUTH_API_URL: ${NEXT_PUBLIC_AUTH_API_URL:-https://api.devmetrics.io}
        NEXT_PUBLIC_ANALYTICS_API_URL: ${NEXT_PUBLIC_ANALYTICS_API_URL:-https://api.devmetrics.io}
        NEXT_PUBLIC_AI_API_URL: ${NEXT_PUBLIC_AI_API_URL:-https://api.devmetrics.io}
        NEXT_PUBLIC_GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
    container_name: devmetrics_frontend
    depends_on:
      - auth_service
      - analytics_service
      - ai_service
    networks:
      - devmetrics_network
    restart: always
    deploy:
      resources:
        limits:
          memory: 512m

  nginx:
    image: nginx:alpine
    container_name: devmetrics_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - frontend
      - auth_service
      - ingestion_service
      - analytics_service
      - ai_service
    networks:
      - devmetrics_network
    restart: always

volumes:
  postgres_data:
  redis_data:
  nginx_cache:

networks:
  devmetrics_network:
    driver: bridge
