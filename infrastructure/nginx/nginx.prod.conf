worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=api_auth:10m   rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_ai:10m     rate=2r/s;

    # Upstreams
    upstream frontend      { server frontend:3000;      keepalive 32; }
    upstream auth_api      { server auth_service:8000;  keepalive 16; }
    upstream ingestion_api { server ingestion_service:8000; keepalive 16; }
    upstream analytics_api { server analytics_service:8000; keepalive 16; }
    upstream ai_api        { server ai_service:8000;    keepalive 8;  }

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS main server
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # Proxy settings
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_cache_bypass $http_upgrade;
        }

        # Auth Service — stricter rate limit
        location /auth/ {
            limit_req zone=api_auth burst=10 nodelay;
            rewrite ^/auth/(.*)$ /api/v1/$1 break;
            proxy_pass http://auth_api;
        }

        # Ingestion Service
        location /ingestion/ {
            limit_req zone=api_general burst=20 nodelay;
            rewrite ^/ingestion/(.*)$ /api/v1/$1 break;
            proxy_pass http://ingestion_api;
        }

        # Analytics Service
        location /analytics/ {
            limit_req zone=api_general burst=30 nodelay;
            rewrite ^/analytics/(.*)$ /api/v1/$1 break;
            proxy_pass http://analytics_api;
        }

        # AI Service — conservative rate limit (GPT-4 costs money)
        location /ai/ {
            limit_req zone=api_ai burst=5 nodelay;
            rewrite ^/ai/(.*)$ /api/v1/$1 break;
            proxy_pass http://ai_api;
            proxy_read_timeout 120s;
        }

        # Health checks (no rate limit, no auth)
        location /health {
            proxy_pass http://auth_api/health;
            access_log off;
        }

        location /health/analytics {
            proxy_pass http://analytics_api/health;
            access_log off;
        }

        location /health/ai {
            proxy_pass http://ai_api/health;
            access_log off;
        }
    }
}
