version: '3.8'

# Monitoring stack — run alongside the main docker-compose.prod.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#                       -f infrastructure/monitoring/docker-compose.monitoring.yml up -d

services:
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: devmetrics_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - devmetrics_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.0
    container_name: devmetrics_grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-devmetrics_grafana}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infrastructure/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - devmetrics_network
    restart: unless-stopped

  # Host metrics
  node_exporter:
    image: prom/node-exporter:v1.7.0
    container_name: devmetrics_node_exporter
    command:
      - '--path.rootfs=/host'
    volumes:
      - /:/host:ro,rslave
    networks:
      - devmetrics_network
    restart: unless-stopped
    pid: host

  # PostgreSQL metrics
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: devmetrics_postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      - postgres
    networks:
      - devmetrics_network
    restart: unless-stopped

  # Redis metrics
  redis_exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: devmetrics_redis_exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      - redis
    networks:
      - devmetrics_network
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:

networks:
  devmetrics_network:
    external: true
